<?xml version="1.0" encoding="UTF-8"?>
<!-- 十勝岳連峰をイメージした抽象稜線。背景は温かい off-white、線は金 (#C9A961) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"
     role="img" aria-label="Abstract ridgeline evoking the Tokachi range">

  <rect width="800" height="500" fill="#FBF9F4"/>

  <defs>
    <linearGradient id="sunGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#C9A961" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#C9A961" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- 太陽 -->
  <circle cx="620" cy="160" r="42" fill="url(#sunGrad)" opacity="0.6"/>
  <circle cx="620" cy="160" r="56" fill="none" stroke="#C9A961" stroke-width="0.5" stroke-opacity="0.35"/>
  <circle cx="620" cy="160" r="72" fill="none" stroke="#C9A961" stroke-width="0.5" stroke-opacity="0.2"/>

  <!-- 最奥の稜線 -->
  <path fill="none" stroke="#C9A961" stroke-width="0.7" stroke-opacity="0.28"
        stroke-linecap="round" stroke-linejoin="round"
        d="M 0 360 C 80 350, 140 345, 200 340 S 340 320, 420 330 S 560 340, 640 330 S 760 350, 800 360"/>

  <!-- 中景の稜線 -->
  <path fill="none" stroke="#C9A961" stroke-width="0.9" stroke-opacity="0.55"
        stroke-linecap="round" stroke-linejoin="round"
        d="M 0 380 L 60 340 L 110 330 L 180 290 L 240 310 L 300 270 L 370 290 L 440 250 L 510 280 L 580 260 L 650 290 L 720 300 L 800 320"/>

  <!-- 前景（十勝岳主峰）-->
  <path fill="none" stroke="#C9A961" stroke-width="1.1" stroke-opacity="0.85"
        stroke-linecap="round" stroke-linejoin="round"
        d="M 0 420 L 60 390 L 130 370 L 200 340 L 260 360 L 320 300 L 370 330 L 420 240 L 480 280 L 540 320 L 600 290 L 670 340 L 740 360 L 800 390"/>
</svg>
